<!-- register.html -->
<div class="auth-page">

  <!-- Left decorative panel -->
  <div class="auth-panel auth-panel--left">
    <div class="auth-panel__content">
      <span class="auth-panel__mark">⬡</span>
      <h1 class="auth-panel__headline">
        Share your<br><em>craft with the<br>world.</em>
      </h1>
      <p class="auth-panel__sub">
        Join thousands of artisans who are building their presence and connecting with clients.
      </p>
      <div class="auth-panel__dots">
        <span class="dot"></span>
        <span class="dot dot--active"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-panel auth-panel--right">
    <div class="auth-form-wrap">

      <div class="auth-form__header">
        <h2 class="auth-form__title">Create account</h2>
        <p class="auth-form__subtitle">Join the Artisan community today</p>
      </div>

      <div *ngIf="error" class="auth-error">
        ⚠️ {{ error }}
      </div>

      <div class="auth-form">

        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input
            id="name"
            type="text"
            class="form-input"
            placeholder="Your name"
            [(ngModel)]="name"
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            [(ngModel)]="email"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="At least 8 characters"
            [(ngModel)]="password"
            (keyup.enter)="register()"
            autocomplete="new-password"
          />
        </div>

        <button
          class="btn btn--primary btn--full"
          (click)="register()"
          [disabled]="loading"
          style="margin-top: 8px;"
        >
          <span *ngIf="loading" class="spinner spinner--sm"></span>
          <span>{{ loading ? 'Creating account…' : 'Create account' }}</span>
        </button>

      </div>

      <p class="auth-form__switch">
        Already have an account?
        <a routerLink="/login" class="auth-form__switch-link">Sign in →</a>
      </p>

    </div>
  </div>

</div>
